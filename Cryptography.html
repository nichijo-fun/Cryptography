<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Welcome</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            background-color: #121212;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "BIZ UDPGothic", sans-serif;
            cursor: pointer;
        }

        .main-content {
            text-align: center;
            user-select: none;
            max-width: 90%;
            line-height: 1.8;
        }

        /* プレイヤー本体は非表示 */
        audio {
            display: none;
        }

        .cipher {
            margin-top: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            font-family: monospace;
            word-break: break-all;
            color: #ff3e3e;
            font-size: 1.1rem;
            letter-spacing: 2px;
        }

        .guide-text {
            font-size: 0.9rem;
            color: #888;
            margin-top: 20px;
            animation: blink 2s infinite;
        }

        /* 追加：音楽操作ボタンのスタイル */
        .audio-controls {
            margin-top: 25px;
        }

        .audio-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #ff3e3e;
            color: #ff3e3e;
            padding: 8px 20px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.3s;
            border-radius: 5px;
        }

        .audio-btn:hover {
            background: #ff3e3e;
            color: white;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>

    <div id="display-area" class="main-content">
        <h1>Come on in, you who are confident in your intelligence!</h1>
        <p>画面のどこかをクリックするとBGMが流れ出して問題が出るよ</p>
        <div class="guide-text">CLICK TO START MUSIC</div>
    </div>

    <audio id="bgm" src="music.mp3" loop></audio>

    <script>
        const audio = document.getElementById('bgm');
        const displayArea = document.getElementById('display-area');
        let isStarted = false;

        // 音楽の再生/停止を切り替える関数
        function toggleAudio() {
            const btn = document.getElementById('toggle-btn');
            if (audio.paused) {
                audio.play();
                btn.innerText = "BGM STOP";
            } else {
                audio.pause();
                btn.innerText = "BGM PLAY";
            }
        }

        document.body.addEventListener('click', (e) => {
            // ボタン自体をクリックしたときはこのイベント（開始処理）を無視する
            if (e.target.tagName === 'BUTTON') return;

            if (!isStarted) {
                audio.currentTime = 0;
                audio.play().then(() => {
                    isStarted = true;
                    
                    displayArea.innerHTML = `
                        <h2>これが今回の問題</h2>
                        <p>真犯人フラグ...</p>
                        <p>暗号...</p>
                        <p>これが表すものを解読した時、道は開かれる。</p>
                        <div class="cipher">
                            2344443543://33241323242434-214533.222444234512.2434/3534315412244543-132435231542/
                        </div>
                        <div class="audio-controls">
                            <button id="toggle-btn" class="audio-btn" onclick="toggleAudio()">BGM STOP</button>
                        </div>
                    `;
                    document.body.style.cursor = "default";
                }).catch(error => {
                    console.error("再生に失敗しました:", error);
                });
            }
        });
    </script>

</body>
</html>
